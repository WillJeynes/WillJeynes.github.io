---
layout: page
---
<h1>Redirecting...</h1>
<a id="redir" src="/">Click Here</a>
<p style="display: none;" id="cat">{{page.class}}</p>
<p style="display: none;" id="cat2">{{page.title | uri_escape }}</p>
<script>
  const result = "/projects/" + document.getElementById("cat").innerText.toLowerCase() + "#" + document.getElementById("cat2").innerText;
  document.getElementById("redir").src = result
  window.location.replace(result);
</script>
